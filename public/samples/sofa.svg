<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <rect width="800" height="600" fill="#efe6d6"/>
  <rect y="430" width="800" height="170" fill="#e1d5c1"/>
  <!-- reclining sofa silhouette -->
  <g fill="#3b3833">
    <rect x="150" y="270" width="500" height="170" rx="28"/>
    <rect x="130" y="210" width="90" height="230" rx="26"/>
    <rect x="580" y="210" width="90" height="230" rx="26"/>
    <rect x="230" y="225" width="340" height="90" rx="20" fill="#8b8680"/>
    <rect x="175" y="440" width="28" height="44"/>
    <rect x="597" y="440" width="28" height="44"/>
  </g>
  <!-- post-it price sticker -->
  <g transform="rotate(-6 415 330)">
    <rect x="350" y="280" width="130" height="110" fill="#ffe14d" stroke="#e6c200" stroke-width="2"/>
    <rect x="350" y="280" width="130" height="16" fill="#f4d63b"/>
    <text x="415" y="350" font-family="Comic Sans MS, Marker Felt, cursive" font-size="44" font-weight="700" fill="#1d1a12" text-anchor="middle">$450</text>
  </g>
  <text x="400" y="560" font-family="Georgia, serif" font-size="20" fill="#6b5d4a" text-anchor="middle" font-style="italic">sample photo — gray reclining sofa</text>
</svg>
