<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <rect width="800" height="600" fill="#f1e7d6"/>
  <rect y="440" width="800" height="160" fill="#d9c6a8"/>
  <!-- dresser silhouette -->
  <g fill="#4a342a">
    <rect x="250" y="160" width="300" height="290" rx="10"/>
    <rect x="270" y="180" width="260" height="56" rx="6" fill="#8a6549"/>
    <rect x="270" y="246" width="260" height="56" rx="6" fill="#8a6549"/>
    <rect x="270" y="312" width="260" height="56" rx="6" fill="#8a6549"/>
    <rect x="270" y="378" width="260" height="52" rx="6" fill="#8a6549"/>
    <circle cx="390" cy="208" r="6" fill="#e7d6c6"/><circle cx="410" cy="208" r="6" fill="#e7d6c6"/>
    <circle cx="390" cy="274" r="6" fill="#e7d6c6"/><circle cx="410" cy="274" r="6" fill="#e7d6c6"/>
    <circle cx="390" cy="340" r="6" fill="#e7d6c6"/><circle cx="410" cy="340" r="6" fill="#e7d6c6"/>
  </g>
